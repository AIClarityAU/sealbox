<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Circular vault door icon">
  <rect width="32" height="32" rx="6" fill="#14171f"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vault door -->
    <circle cx="16" cy="16" r="13" stroke="#2dd4bf" stroke-width="2.5"/>

    <!-- Faint concentric ring -->
    <circle cx="16" cy="16" r="8.5" stroke="#5eead4" stroke-width="1.5" opacity="0.35"/>

    <!-- Four radial locking bolts -->
    <path d="M16 5V9.5" stroke="#2dd4bf" stroke-width="2.5"/>
    <path d="M16 22.5V27" stroke="#2dd4bf" stroke-width="2.5"/>
    <path d="M5 16H9.5" stroke="#2dd4bf" stroke-width="2.5"/>
    <path d="M22.5 16H27" stroke="#2dd4bf" stroke-width="2.5"/>

    <!-- Central locking-pin hub -->
    <circle cx="16" cy="16" r="4.2" fill="#14171f" stroke="#5eead4" stroke-width="2.5"/>
    <circle cx="16" cy="16" r="1.4" fill="#2dd4bf" stroke="none"/>
  </g>
</svg>
