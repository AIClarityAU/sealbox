<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sealbox social card">
  <defs>
    <!-- Soft teal glow -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="65%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.34"/>
      <stop offset="38%" stop-color="#2dd4bf" stop-opacity="0.12"/>
      <stop offset="72%" stop-color="#2dd4bf" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>

    <filter id="markGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.176
                0 0 0 0 0.831
                0 0 0 0 0.749
                0 0 0 0.75 0"
        result="glow"
      />
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softLogoHalo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.176
                0 0 0 0 0.831
                0 0 0 0 0.749
                0 0 0 0.42 0"
      />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0f14"/>
  <rect width="1200" height="630" fill="url(#topGlow)"/>

  <!-- Subtle premium framing -->
  <rect x="28" y="28" width="1144" height="574" rx="34" fill="none" stroke="#2dd4bf" stroke-opacity="0.08"/>

  <!-- Logo moved farther right for more horizontal whitespace -->
  <circle cx="1010" cy="286" r="128" fill="#2dd4bf" opacity="0.22" filter="url(#softLogoHalo)"/>

  <!-- Circular vault door mark -->
  <g transform="translate(900 176) scale(6.875)" filter="url(#markGlow)">
    <rect width="32" height="32" rx="7" fill="#14171f"/>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Vault door -->
      <circle cx="16" cy="16" r="10.5" stroke="#2dd4bf" stroke-width="2"/>

      <!-- Faint concentric ring -->
      <circle cx="16" cy="16" r="7" stroke="#5eead4" stroke-width="1.25" opacity="0.35"/>

      <!-- Four radial locking bolts -->
      <path d="M16 8.8V12.2" stroke="#2dd4bf" stroke-width="2"/>
      <path d="M16 19.8V23.2" stroke="#2dd4bf" stroke-width="2"/>
      <path d="M8.8 16H12.2" stroke="#2dd4bf" stroke-width="2"/>
      <path d="M19.8 16H23.2" stroke="#2dd4bf" stroke-width="2"/>

      <!-- Central locking-pin hub -->
      <circle cx="16" cy="16" r="3" fill="#14171f" stroke="#5eead4" stroke-width="2"/>
      <circle cx="16" cy="16" r="1" fill="#2dd4bf" stroke="none"/>
    </g>
  </g>

  <!-- Headline -->
  <text
    x="88"
    y="224"
    fill="#ffffff"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="64"
    font-weight="800"
    letter-spacing="-2.7"
  >
    <tspan x="88" dy="0">The coding agent that</tspan>
    <tspan x="88" dy="78" fill="#2dd4bf">can&apos;t betray you</tspan>
  </text>

  <!-- Subline -->
  <text
    x="91"
    y="405"
    fill="#9ca3af"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="25"
    font-weight="500"
    letter-spacing="-0.25"
  >
    Credential-free, sealed execution · sealbox.dev
  </text>

  <!-- Small accent line -->
  <path
    d="M91 455H315"
    stroke="#2dd4bf"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.72"
  />
</svg>