<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Circular vault door icon">
  <rect width="32" height="32" rx="7" fill="#14171f"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vault door -->
    <circle cx="16" cy="16" r="10.5" stroke="#2dd4bf" stroke-width="2"/>

    <!-- Faint concentric ring -->
    <circle cx="16" cy="16" r="7" stroke="#5eead4" stroke-width="1.25" opacity="0.35"/>

    <!-- Four radial locking bolts -->
    <path d="M16 8.8V12.2" stroke="#2dd4bf" stroke-width="2"/>
    <path d="M16 19.8V23.2" stroke="#2dd4bf" stroke-width="2"/>
    <path d="M8.8 16H12.2" stroke="#2dd4bf" stroke-width="2"/>
    <path d="M19.8 16H23.2" stroke="#2dd4bf" stroke-width="2"/>

    <!-- Central locking-pin hub -->
    <circle cx="16" cy="16" r="3" fill="#14171f" stroke="#5eead4" stroke-width="2"/>
    <circle cx="16" cy="16" r="1" fill="#2dd4bf" stroke="none"/>
  </g>
</svg>